keys:
  - &aor age1lugsexhep5d5w09tyd8xem5s06w6umgkpkcnghzh0se29duwh30q32rr6f

creation_rules:
  # 用户级密文：users/<userName>.yaml
  - path_regex: users/[^/]+\.yaml$
    key_groups:
      - age:
          - *aor

  # 系统级密文：hosts/<hostName>.yaml
  # TODO: 目前暂用 aor 的个人 age key 加密；待各主机生成自己的 age key 后，
  #       改为按主机分别列出 recipient（主机 key + aor key），
  #       使主机只能解开自己的 secrets。
  - path_regex: hosts/[^/]+\.yaml$
    key_groups:
      - age:
          - *aor
